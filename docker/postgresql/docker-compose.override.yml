# Docker Compose Override for Development
# This file provides development-specific overrides
# Copy to docker-compose.override.yml to use

version: '3.8'

services:
  postgresql:
    # Development database settings
    environment:
      POSTGRES_DB: crmdb_dev
    ports:
      - "5433:5432"  # Different port to avoid conflicts
    volumes:
      # Use named volume instead of bind mount for development
      - postgres_dev_data:/var/lib/postgresql/data
    
  sales-crm-app:
    # Development application settings
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_NAME: crmdb_dev
      JAVA_OPTS: "-Xmx256m -Xms128m -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"
    ports:
      - "8080:8080"
      - "5005:5005"  # Debug port
    volumes:
      # Mount source code for hot reload (if using Spring Boot DevTools)
      - ../../target/classes:/app/classes
      - ../../src/main/resources:/app/resources
    depends_on:
      postgresql:
        condition: service_healthy

volumes:
  postgres_dev_data:
    driver: local