# Test Configuration for Sales CRM Application

# H2 Test Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=never

# JPA Configuration for Tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.defer-datasource-initialization=true

# H2 Console Configuration for Tests
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Disable Thymeleaf cache for tests
spring.thymeleaf.cache=false

# Logging Configuration for Tests
logging.level.com.pasp.ict.salescrm=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.test=INFO

# Security Configuration for Tests
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN

# Disable banner for tests
spring.main.banner-mode=off

# Test specific configurations
spring.test.database.replace=none

# Encryption Configuration for Tests
app.encryption.key=testEncryptionKey123456789012345678901234

# Session Configuration for Tests
server.servlet.session.timeout=10m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=strict

# Email Configuration for Tests (Mock)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Backup Configuration for Tests
app.backup.directory=test-backups
app.backup.retention.days=1
app.backup.enabled=false

# Notification Configuration for Tests
app.notification.enabled=false
app.notification.from-email=test@salescrm.com
app.notification.system-name=Sales CRM System (Test)
app.notification.admin-emails=admin@test.com

# Performance Configuration for Tests
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# Test Data Configuration
app.test.data.initialize=false
app.test.data.cleanup=true

# jqwik Configuration for Property-Based Tests
jqwik.database.file=.jqwik-database-test
jqwik.tries.default=100
jqwik.max.discard.ratio=10
jqwik.reporting.only-failures=true
jqwik.shrinking.mode=BOUNDED
jqwik.generation.mode=RANDOMIZED

# Test Environment Specific Settings
app.test.mock.external-services=true
app.test.performance.enabled=true
app.test.data.seed=12345

# Validation Configuration for Tests
spring.jpa.properties.hibernate.validator.apply_to_ddl=false
spring.jpa.properties.hibernate.validator.autoregister_listeners=false