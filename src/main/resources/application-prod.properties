# Production Environment Configuration

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:crmdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:crmuser}
spring.datasource.password=${DB_PASSWORD:crmpass}

# JPA Configuration for Production
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console Disabled for Production
spring.h2.console.enabled=false

# Thymeleaf Production Settings
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Production Logging
logging.level.com.pasp.ict.salescrm=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
logging.level.root=WARN

# Security Production Settings (Override with environment variables)
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:changeme}
spring.security.user.roles=ADMIN

# Encryption Configuration for Production
app.encryption.key=${ENCRYPTION_KEY:}

# Session Configuration for Production
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# Production Server Configuration
server.port=${PORT:8080}
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# Email Configuration for Production
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}

# Backup Configuration for Production
app.backup.directory=${BACKUP_DIRECTORY:/var/backups/salescrm}
app.backup.retention.days=${BACKUP_RETENTION_DAYS:90}
app.backup.enabled=${BACKUP_ENABLED:true}

# Notification Configuration for Production
app.notification.enabled=${NOTIFICATION_ENABLED:true}
app.notification.from-email=${NOTIFICATION_FROM_EMAIL:noreply@yourcompany.com}
app.notification.system-name=${NOTIFICATION_SYSTEM_NAME:Sales CRM System}
app.notification.admin-emails=${NOTIFICATION_ADMIN_EMAILS:}