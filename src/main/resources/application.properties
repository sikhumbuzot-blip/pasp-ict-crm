# Application Configuration
spring.application.name=sales-crm
server.port=8080

# Database Configuration (PostgreSQL Default)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:crmdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:crmuser}
spring.datasource.password=${DB_PASSWORD:crmpass}

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization
spring.sql.init.mode=never

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Security Configuration
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin123}
spring.security.user.roles=ADMIN

# Encryption Configuration
app.encryption.key=${ENCRYPTION_KEY:defaultEncryptionKey123456789012}

# Session Configuration
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=strict

# Logging Configuration
logging.level.com.pasp.ict.salescrm=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email Configuration
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Backup Configuration
app.backup.directory=${BACKUP_DIRECTORY:backups}
app.backup.retention.days=${BACKUP_RETENTION_DAYS:30}
app.backup.enabled=${BACKUP_ENABLED:true}

# Notification Configuration
app.notification.enabled=${NOTIFICATION_ENABLED:true}
app.notification.from-email=${NOTIFICATION_FROM_EMAIL:noreply@salescrm.com}
app.notification.system-name=${NOTIFICATION_SYSTEM_NAME:Sales CRM System}
app.notification.admin-emails=${NOTIFICATION_ADMIN_EMAILS:admin@example.com}
