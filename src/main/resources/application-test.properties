# Test Environment Configuration

# Database Configuration (H2 In-Memory for Testing)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for Testing
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console Disabled for Testing
spring.h2.console.enabled=false

# Thymeleaf Test Settings
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Test Logging Configuration
logging.level.com.pasp.ict.salescrm=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN
logging.level.org.springframework.test=INFO

# Security Test Settings
spring.security.user.name=testadmin
spring.security.user.password=testpass
spring.security.user.roles=ADMIN

# Session Configuration for Testing
server.servlet.session.timeout=10m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# Test Server Configuration
server.port=0
server.error.include-message=never
server.error.include-binding-errors=never